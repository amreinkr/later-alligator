<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Later Alligator 🐊</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="lang-switcher">
    <button class="lang-btn active" data-lang="en" aria-label="Switch to English">EN</button>
    <button class="lang-btn" data-lang="es" aria-label="Cambiar a español">ES</button>
  </div>

  <div class="card">
    <header>
      <span class="gator">🐊</span>
      <h1>Later Alligator</h1>
      <p class="tagline" data-i18n="tagline">Add time to any start time — see you later!</p>
    </header>

    <div class="divider"></div>

    <section class="input-group">
      <label data-i18n="startLabel">Start date &amp; time</label>
      <div class="datetime-inputs">
        <input type="date" id="originDate" />
        <input type="time" id="originTime" value="12:00" />
      </div>
    </section>

    <section class="input-group add-time">
      <label data-i18n="addTimeLabel">Add time</label>
      <div class="add-time-inputs">
        <div class="spinner-wrap">
          <button class="spin-btn" data-target="years" data-dir="up">▲</button>
          <input type="number" id="years" min="0" max="9999" value="0" aria-label="Years" data-i18n-aria="yearsAria" />
          <button class="spin-btn" data-target="years" data-dir="down">▼</button>
          <span class="unit" data-i18n="unitYr">yr</span>
        </div>
        <div class="spinner-wrap">
          <button class="spin-btn" data-target="days" data-dir="up">▲</button>
          <input type="number" id="days" min="0" max="9999" value="0" aria-label="Days" data-i18n-aria="daysAria" />
          <button class="spin-btn" data-target="days" data-dir="down">▼</button>
          <span class="unit" data-i18n="unitDay">day</span>
        </div>
        <div class="spinner-wrap">
          <button class="spin-btn" data-target="hours" data-dir="up">▲</button>
          <input type="number" id="hours" min="0" max="999" value="0" aria-label="Hours" data-i18n-aria="hoursAria" />
          <button class="spin-btn" data-target="hours" data-dir="down">▼</button>
          <span class="unit" data-i18n="unitHr">hr</span>
        </div>
        <div class="spinner-wrap">
          <button class="spin-btn" data-target="minutes" data-dir="up">▲</button>
          <input type="number" id="minutes" min="0" max="59" value="0" aria-label="Minutes" data-i18n-aria="minutesAria" />
          <button class="spin-btn" data-target="minutes" data-dir="down">▼</button>
          <span class="unit" data-i18n="unitMin">min</span>
        </div>
      </div>
    </section>

    <button id="calculateBtn" class="calculate-btn" data-i18n="calculateBtn">Calculate ➜</button>

    <section class="result" id="result" hidden>
      <span class="result-label" data-i18n="resultLabel">Result</span>
      <span class="result-time" id="resultTime"></span>
      <span class="result-date" id="resultDate"></span>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
